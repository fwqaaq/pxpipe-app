name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            build_script: build:win

          - name: macOS
            os: macos-latest
            build_script: build:mac

          - name: Linux
            os: ubuntu-latest
            build_script: build:linux

    steps:
      - name: Checkout pxpipe-app
        uses: actions/checkout@v7
        with:
          path: pxpipe-app

      - name: Checkout pxpipe proxy
        uses: actions/checkout@v7
        with:
          repository: teamchong/pxpipe
          path: pxpipe

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.28.2

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: |
            pxpipe-app/pnpm-lock.yaml
            pxpipe/pnpm-lock.yaml

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools rpm

      - name: Install pxpipe proxy dependencies
        working-directory: pxpipe
        run: pnpm install --frozen-lockfile

      - name: Install pxpipe-app dependencies
        working-directory: pxpipe-app
        run: pnpm install --frozen-lockfile

      - name: Check macOS signing secrets
        if: matrix.name == 'macOS'
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        shell: bash
        run: |
          if [[ -z "$CSC_LINK" || -z "$CSC_KEY_PASSWORD" ]]; then
            echo "Missing CSC_LINK or CSC_KEY_PASSWORD for Developer ID signing." >&2
            exit 1
          fi

          if [[ -n "$APPLE_API_KEY" && -n "$APPLE_API_KEY_ID" && -n "$APPLE_API_ISSUER" ]]; then
            exit 0
          fi

          if [[ -n "$APPLE_ID" && -n "$APPLE_APP_SPECIFIC_PASSWORD" && -n "$APPLE_TEAM_ID" ]]; then
            exit 0
          fi

          echo "Missing notarization credentials. Provide APPLE_API_KEY/APPLE_API_KEY_ID/APPLE_API_ISSUER or APPLE_ID/APPLE_APP_SPECIFIC_PASSWORD/APPLE_TEAM_ID." >&2
          exit 1

      - name: Build package
        working-directory: pxpipe-app
        env:
          # Important:
          # Do not let electron-builder publish during build.
          # We upload all assets in the release job below.
          ELECTRON_BUILDER_PUBLISH: never

          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}

          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: pnpm run ${{ matrix.build_script }}

      - name: Upload packaged assets
        uses: actions/upload-artifact@v7
        with:
          name: pxpipe-app-${{ matrix.name }}
          path: |
            pxpipe-app/dist/*.dmg
            pxpipe-app/dist/*.zip
            pxpipe-app/dist/*.exe
            pxpipe-app/dist/*.AppImage
            pxpipe-app/dist/*.deb
            pxpipe-app/dist/*.rpm
            pxpipe-app/dist/*.blockmap
            pxpipe-app/dist/latest*.yml
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download packaged assets
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: find release-assets -maxdepth 1 -type f -print | sort

      - name: Delete existing GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release delete "$GITHUB_REF_NAME" --yes || true

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: release-assets/*
          fail_on_unmatched_files: true
          overwrite_files: true
