name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            build_script: build:win
          - name: macOS
            os: macos-latest
            build_script: build:mac
          - name: Linux
            os: ubuntu-latest
            build_script: build:linux

    steps:
      - name: Checkout pxpipe-app
        uses: actions/checkout@v7
        with:
          path: pxpipe-app

      - name: Checkout pxpipe proxy
        uses: actions/checkout@v7
        with:
          repository: teamchong/pxpipe
          path: pxpipe

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.28.2

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: |
            pxpipe-app/pnpm-lock.yaml
            pxpipe/pnpm-lock.yaml

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools rpm

      - name: Install pxpipe proxy dependencies
        working-directory: pxpipe
        run: pnpm install --frozen-lockfile

      - name: Install pxpipe-app dependencies
        working-directory: pxpipe-app
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: pxpipe-app
        run: pnpm run ${{ matrix.build_script }}

      - name: Upload packaged assets
        uses: actions/upload-artifact@v7
        with:
          name: pxpipe-app-${{ matrix.name }}
          path: |
            pxpipe-app/dist/*.dmg
            pxpipe-app/dist/*.zip
            pxpipe-app/dist/*.exe
            pxpipe-app/dist/*.AppImage
            pxpipe-app/dist/*.deb
            pxpipe-app/dist/*.blockmap
            pxpipe-app/dist/latest*.yml
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download packaged assets
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: find release-assets -maxdepth 1 -type f -print | sort

      - name: Delete existing GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release delete "$GITHUB_REF_NAME" --yes || true

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: release-assets/*
          fail_on_unmatched_files: true
          overwrite_files: true
